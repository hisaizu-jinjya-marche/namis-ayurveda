<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>久伊豆神社 境内石碑データベース</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --c-bg: #f5f2ee; --c-surface: #ffffff; --c-sidebar: #1e1a16;
  --c-ink: #1a1410; --c-muted: #6b6560; --c-border: #d8d0c8;
  --c-accent: #8b3a2a; --c-gold: #9a7830; --c-tag-bg: #f0ece6;
  --c-hover: #faf7f3; --sidebar-w: 220px; --header-h: 52px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--c-bg); color: var(--c-ink); min-height: 100vh; }

/* ===== LOGIN ===== */
.login-screen { display: none; position: fixed; inset: 0; z-index: 1000; background: #f0ebe2; align-items: center; justify-content: center; }
.login-screen.show { display: flex; }
.login-box {
  width: 360px;
  background: #fff;
  border-radius: 4px;
  padding: 48px 40px 40px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.10);
}
.login-mon {
  text-align: center;
  font-size: 28px; color: #9a7830;
  margin-bottom: 8px; line-height: 1;
}
.login-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 18px; color: #1a1410;
  text-align: center;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.login-sub {
  font-size: 11px; color: #999;
  text-align: center;
  letter-spacing: 0.06em;
  margin-bottom: 32px;
}
.login-label {
  display: block;
  font-size: 13px;
  color: #1a1410;
  font-weight: 500;
  margin-bottom: 6px;
  margin-top: 16px;
}
.login-input {
  width: 100%;
  background: #fff;
  border: 1px solid #c8c0b8;
  border-radius: 4px;
  padding: 12px 14px;
  font-size: 15px;
  font-family: inherit;
  color: #1a1410;
  outline: none;
  transition: border-color 0.2s;
}
.login-input:focus { border-color: #9a7830; }
.login-pass-wrap { position: relative; }
.login-pass-wrap .login-input { padding-right: 44px; }
.login-pass-toggle {
  position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: #999; font-size: 13px; padding: 0;
  font-family: inherit; letter-spacing: 0;
}
.login-pass-toggle:hover { color: #555; }
.login-btn {
  width: 100%;
  background: #8b3a2a;
  color: #fff; border: none; border-radius: 4px;
  padding: 14px; font-size: 15px;
  font-family: inherit; cursor: pointer;
  margin-top: 24px;
  letter-spacing: 0.06em;
  transition: background 0.15s;
}
.login-btn:hover { background: #7a3020; }
.login-error {
  color: #c62828; font-size: 12px;
  margin-top: 10px; min-height: 18px;
  text-align: center;
}

/* ===== HEADER ===== */
.site-header { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: var(--header-h); background: var(--c-sidebar); display: flex; align-items: center; gap: 16px; padding: 0 20px; border-bottom: 2px solid #9a7830; }
.logo { font-family: 'Noto Serif JP', serif; font-size: 15px; font-weight: 700; color: #d4a853; letter-spacing: 0.08em; white-space: nowrap; }
.logo small { display: block; font-size: 10px; font-weight: 400; color: rgba(212,168,83,0.6); letter-spacing: 0.12em; margin-top: 1px; }
.header-search { flex: 1; max-width: 480px; display: flex; align-items: center; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18); border-radius: 6px; padding: 0 12px; gap: 8px; }
.header-search:focus-within { background: rgba(255,255,255,0.14); border-color: #9a7830; }
.header-search input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 14px; font-family: inherit; padding: 9px 0; }
.header-search input::placeholder { color: rgba(255,255,255,0.4); }
.header-search svg { color: rgba(255,255,255,0.45); flex-shrink: 0; }
.btn-search { background: var(--c-accent); color: #fff; border: none; border-radius: 5px; padding: 7px 16px; font-size: 13px; font-family: inherit; cursor: pointer; white-space: nowrap; }
.btn-search:hover { filter: brightness(1.15); }
.btn-add-header { background: transparent; border: 1px solid rgba(154,120,48,0.6); color: #d4a853; border-radius: 5px; padding: 7px 14px; font-size: 13px; font-family: inherit; cursor: pointer; white-space: nowrap; }
.btn-add-header:hover { background: rgba(154,120,48,0.15); }
.btn-logout { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); border-radius: 5px; padding: 7px 14px; font-size: 12px; font-family: inherit; cursor: pointer; white-space: nowrap; }
.btn-logout:hover { border-color: rgba(255,255,255,0.4); color: #fff; }

/* ===== LAYOUT ===== */
.layout { display: flex; margin-top: var(--header-h); min-height: calc(100vh - var(--header-h)); }
.sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--c-sidebar); min-height: calc(100vh - var(--header-h)); position: sticky; top: var(--header-h); height: calc(100vh - var(--header-h)); overflow-y: auto; padding: 20px 0 40px; }
.sidebar-section { margin-bottom: 24px; }
.sidebar-label { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(212,168,83,0.55); padding: 0 16px; margin-bottom: 6px; }
.sidebar-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 16px; cursor: pointer; font-size: 13px; color: rgba(255,255,255,0.65); transition: background 0.15s, color 0.15s; border-left: 3px solid transparent; }
.sidebar-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.sidebar-item.active { background: rgba(154,120,48,0.18); color: #d4a853; border-left-color: #9a7830; }
.sidebar-item .cnt { background: rgba(255,255,255,0.12); border-radius: 10px; padding: 1px 7px; font-size: 11px; color: rgba(255,255,255,0.5); }
.sidebar-item.active .cnt { background: rgba(154,120,48,0.3); color: #d4a853; }
.sidebar-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 8px 16px; }
.sidebar-sort { padding: 4px 16px; }
.sidebar-sort select { width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.14); border-radius: 5px; padding: 7px 10px; font-size: 12px; font-family: inherit; color: rgba(255,255,255,0.7); cursor: pointer; outline: none; }
.sidebar-info { padding: 0 16px; }
.info-row { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 11px; color: rgba(255,255,255,0.4); }
.info-val { font-size: 12px; color: rgba(255,255,255,0.7); text-align: right; }

/* ===== MAIN ===== */
.main { flex: 1; min-width: 0; }
.results-bar { padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--c-border); background: var(--c-surface); font-size: 13px; color: var(--c-muted); position: sticky; top: var(--header-h); z-index: 100; }
.badge-filter { background: var(--c-accent); color: #fff; border-radius: 4px; padding: 2px 8px; font-size: 11px; }
.sync-badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
.sync-ok { background: #e8f5e9; color: #2e7d32; }
.sync-err { background: #fdecea; color: #c62828; }
.sync-loading { background: #fff8e1; color: #f57f17; }

/* ===== RECORDS ===== */
.record-list { padding: 0; }
.record { border-bottom: 1px solid var(--c-border); background: var(--c-surface); transition: background 0.12s; }
.record:hover { background: var(--c-hover); }
.record-head { display: flex; align-items: flex-start; gap: 14px; padding: 14px 20px; cursor: pointer; }
.record-num { flex-shrink: 0; font-size: 11px; color: var(--c-muted); padding-top: 3px; min-width: 28px; text-align: right; }
.record-body { flex: 1; min-width: 0; }
.record-title { font-family: 'Noto Serif JP', serif; font-size: 17px; font-weight: 600; color: var(--c-ink); line-height: 1.4; margin-bottom: 6px; letter-spacing: 0.03em; }
.record-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.tag { display: inline-flex; align-items: center; border-radius: 2px; padding: 2px 8px; font-size: 11px; font-weight: 500; white-space: nowrap; letter-spacing: 0.06em; }
.tag-year { background: transparent; color: var(--c-muted); border: 1px solid var(--c-border); }
.tag-cat-記念碑・石碑 { background: transparent; color: #2a5a28; border: 1px solid #b0d4b0; }
.tag-cat-記念碑（伊勢参拝記念） { background: transparent; color: #7a4010; border: 1px solid #e0c090; }
.tag-cat-燈篭 { background: transparent; color: #6a5800; border: 1px solid #dcd090; }
.tag-cat-狛犬 { background: transparent; color: #2a2a9a; border: 1px solid #a8a8e0; }
.tag-cat-鳥居・社号標 { background: transparent; color: #7a1818; border: 1px solid #e0a8a8; }
.tag-place { background: transparent; color: var(--c-muted); border: none; font-size: 12px; padding: 0; }
.tag-place::before { content: "—"; margin-right: 4px; color: var(--c-border); }
.tag-photo { background: transparent; color: var(--c-muted); border: 1px solid var(--c-border); font-size: 11px; }
.record-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
.record:hover .record-actions { opacity: 1; }
.act { border: 1px solid var(--c-border); background: #fff; border-radius: 4px; padding: 5px 12px; font-size: 12px; cursor: pointer; font-family: inherit; color: var(--c-muted); transition: all 0.12s; white-space: nowrap; }
.act:hover { border-color: var(--c-ink); color: var(--c-ink); background: var(--c-tag-bg); }
.act.print:hover { border-color: #2a6; color: #2a6; }
.act.del:hover { border-color: var(--c-accent); color: var(--c-accent); }
.record-expand { flex-shrink: 0; color: var(--c-muted); transition: transform 0.2s; align-self: center; }
.record.open .record-expand { transform: rotate(180deg); }
.record-detail { display: none; border-top: 1px solid var(--c-border); background: #fdfcfa; padding: 16px 20px 16px 62px; }
.record.open .record-detail { display: block; }
.detail-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 14px; }
.detail-field dt { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; color: var(--c-gold); margin-bottom: 3px; text-transform: uppercase; }
.detail-field dd { font-size: 14px; line-height: 1.7; color: var(--c-ink); white-space: pre-line; }
.detail-sep { border: none; border-top: 1px solid var(--c-border); margin: 10px 0; }
.detail-full dt { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; color: var(--c-gold); margin-bottom: 4px; text-transform: uppercase; }
.detail-full dd { font-size: 14px; line-height: 1.8; color: var(--c-muted); white-space: pre-line; }
.detail-full + .detail-full { margin-top: 10px; }

/* ===== MOBILE ===== */
@media (max-width: 640px) {
  :root { --sidebar-w: 0px; --header-h: 48px; }
  .site-header { padding: 0 12px; gap: 8px; }
  .logo small { display: none; }
  .logo { font-size: 13px; }
  .header-search { max-width: none; }
  .btn-search { display: none; }
  .btn-add-header { padding: 6px 10px; font-size: 12px; }
  .btn-logout { padding: 6px 10px; font-size: 11px; }
  .sidebar { display: none; }
  .layout { flex-direction: column; }
  .main { width: 100%; }
  .record-head { padding: 12px 14px; gap: 10px; }
  .record-title { font-size: 15px; }
  .record-actions { display: none; }
  .record.open .record-actions { display: flex; margin: 8px 14px 12px; opacity: 1; }
  .record-detail { padding: 12px 14px; }
  .detail-cols { grid-template-columns: 1fr; gap: 8px; }
  .photo-thumb { width: 80px; height: 80px; }
  .photo-add { width: 80px; height: 80px; }
  .results-bar { padding: 8px 14px; }
  .modal { border-radius: 10px 10px 0 0; position: fixed; bottom: 0; left: 0; right: 0; max-width: none; max-height: 85vh; }
  .modal-overlay { align-items: flex-end; padding: 0; }
  .form-2col { grid-template-columns: 1fr; }
  /* スマホ用フィルターバー */
  .mobile-filter-bar {
    display: flex; overflow-x: auto; gap: 8px;
    padding: 10px 14px; background: var(--c-sidebar);
    scrollbar-width: none;
  }
  .mobile-filter-bar::-webkit-scrollbar { display: none; }
  .mobile-filter-btn {
    flex-shrink: 0; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7); border-radius: 20px;
    padding: 6px 14px; font-size: 12px; font-family: inherit;
    cursor: pointer; white-space: nowrap;
  }
  .mobile-filter-btn.active {
    background: rgba(154,120,48,0.3);
    border-color: #9a7830; color: #d4a853;
  }
  .record-close-btn {
    display: block; width: 100%;
    background: var(--c-tag-bg); border: none;
    border-top: 1px solid var(--c-border);
    padding: 12px; font-size: 13px;
    color: var(--c-muted); cursor: pointer;
    font-family: inherit; text-align: center;
  }
}
@media (min-width: 641px) {
  .mobile-filter-bar { display: none; }
}

/* ===== PHOTOS ===== */
.photo-section { margin-top: 12px; }
.photo-section dt { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; color: var(--c-gold); margin-bottom: 8px; text-transform: uppercase; }
.photo-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.photo-thumb { position: relative; width: 100px; height: 100px; border-radius: 4px; overflow: hidden; border: 1px solid var(--c-border); cursor: pointer; background: #f0ece6; }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.2s; }
.photo-thumb img[loading] { opacity: 0; }
.photo-thumb img.loaded { opacity: 1; }
.photo-thumb .del-photo { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; cursor: pointer; opacity: 0; transition: opacity 0.15s; display: flex; align-items: center; justify-content: center; }
.photo-thumb:hover .del-photo { opacity: 1; }
.photo-add { width: 100px; height: 100px; border: 1px dashed var(--c-border); border-radius: 4px; background: var(--c-tag-bg); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; color: var(--c-muted); font-size: 11px; transition: border-color 0.15s; }
.photo-add:hover { border-color: var(--c-gold); color: var(--c-gold); }
.photo-add span { font-size: 20px; }

/* ===== MISC ===== */
.hl { background: #ffe066; color: #1a1410; border-radius: 2px; padding: 0 2px; font-weight: 700; box-shadow: 0 0 0 1px #f0c000; }
.empty { text-align: center; padding: 80px 20px; color: var(--c-muted); }
.empty big { font-size: 36px; display: block; margin-bottom: 12px; }
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 500; align-items: center; justify-content: center; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 6px; }
.lightbox-close { position: absolute; top: 16px; right: 20px; color: #fff; font-size: 28px; cursor: pointer; background: none; border: none; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 400; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 10px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.25); }
.modal-head { padding: 18px 20px 14px; border-bottom: 1px solid var(--c-border); display: flex; justify-content: space-between; align-items: center; }
.modal-head h2 { font-family: 'Noto Serif JP', serif; font-size: 17px; font-weight: 700; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--c-muted); padding: 2px 6px; border-radius: 4px; }
.modal-close:hover { background: var(--c-tag-bg); }
.modal-body { padding: 16px 20px; }
.modal-foot { padding: 12px 20px; border-top: 1px solid var(--c-border); display: flex; justify-content: flex-end; gap: 8px; }
.form-row { margin-bottom: 12px; }
.form-row label { display: block; font-size: 11px; font-weight: 500; color: var(--c-gold); margin-bottom: 4px; letter-spacing: 0.08em; }
.form-row input, .form-row select, .form-row textarea { width: 100%; border: 1px solid var(--c-border); border-radius: 6px; padding: 9px 12px; font-size: 14px; font-family: inherit; background: #fff; color: var(--c-ink); outline: none; transition: border-color 0.2s; }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--c-gold); }
.form-row textarea { resize: vertical; min-height: 70px; line-height: 1.7; }
.form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-save { background: var(--c-accent); color: #fff; border: none; border-radius: 6px; padding: 9px 20px; font-size: 14px; font-family: inherit; cursor: pointer; }
.btn-save:hover { filter: brightness(1.1); }
.btn-cancel { background: transparent; border: 1px solid var(--c-border); border-radius: 6px; padding: 9px 16px; font-size: 14px; font-family: inherit; cursor: pointer; color: var(--c-muted); }
.btn-cancel:hover { border-color: var(--c-ink); color: var(--c-ink); }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: #1a1410; color: #fff; padding: 10px 22px; border-radius: 24px; font-size: 13px; transition: transform 0.25s; z-index: 600; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ログイン画面 -->
<div class="login-screen show" id="loginScreen">
  <div class="login-box">
    <div class="login-mon">⛩</div>
    <div class="login-title">久伊豆神社</div>
    <div class="login-sub">境内石碑・記念碑 データベース</div>
    <label class="login-label">メールアドレス</label>
    <input type="email" class="login-input" id="loginEmail" placeholder="メールアドレスを入力">
    <label class="login-label">パスワード</label>
    <div class="login-pass-wrap">
      <input type="password" class="login-input" id="loginPass" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="login-pass-toggle" onclick="togglePass()" type="button" id="togglePassBtn">表示</button>
    </div>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- メイン画面 -->
<header class="site-header">
  <div class="logo" onclick="resetAll()" style="cursor:pointer">久伊豆神社<small>境内石碑・記念碑 データベース</small></div>
  <div class="header-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="名称・人物名・場所・銘文で検索…" onkeydown="if(event.key==='Enter')render()">
  </div>
  <button class="btn-search" onclick="render()">検索</button>
  <button class="btn-add-header" onclick="openModal()">＋ 新規追加</button>
  <button class="btn-logout" onclick="doLogout()" id="logoutBtn" style="display:none">ログアウト</button>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">種類で絞り込み</div>
      <div class="sidebar-item active" onclick="setCat('')" id="cat-all">すべて <span class="cnt" id="cnt-all">0</span></div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-item" onclick="setCat('記念碑・石碑')" id="cat-0">記念碑・石碑 <span class="cnt" id="cnt-0">0</span></div>
      <div class="sidebar-item" onclick="setCat('記念碑（伊勢参拝記念）')" id="cat-1">伊勢参拝記念 <span class="cnt" id="cnt-1">0</span></div>
      <div class="sidebar-item" onclick="setCat('燈篭')" id="cat-2">燈篭 <span class="cnt" id="cnt-2">0</span></div>
      <div class="sidebar-item" onclick="setCat('狛犬')" id="cat-3">狛犬 <span class="cnt" id="cnt-3">0</span></div>
      <div class="sidebar-item" onclick="setCat('鳥居・社号標')" id="cat-4">鳥居・社号標 <span class="cnt" id="cnt-4">0</span></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">時代で絞り込み</div>
      <div class="sidebar-item" onclick="setJidai('')" id="era-all">すべての時代</div>
      <div class="sidebar-item" onclick="setJidai('江戸時代')" id="era-0">江戸時代</div>
      <div class="sidebar-item" onclick="setJidai('明治')" id="era-1">明治</div>

function togglePass() {
  const input = document.getElementById('loginPass');

  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '非表示';
  } else {
    input.type = 'password';
    btn.textContent = '表示';
  }
}

function resetAll() {
  document.getElementById('searchInput').value = '';
  currentCat = '';

  ['cat-all','cat-0','cat-1','cat-2','cat-3','cat-4'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  ['m-cat-all','m-cat-0','m-cat-1','m-cat-2','m-cat-3','m-cat-4'].forEach(id => document.getElementById(id)?.classList.remove('active'));

// ===== 認証（シンプルパスワード方式） =====
const PASSWORDS = {
  'mail5@hisaizu.jp': 'pass1012',
};
const SESSION_KEY = 'hisaizu_session';

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (PASSWORDS[email] && PASSWORDS[email] === pass) {
    sessionStorage.setItem(SESSION_KEY, email);
    document.getElementById('loginScreen').classList.remove('show');
    document.getElementById('logoutBtn').style.display = 'inline-block';
    document.getElementById('info-user').textContent = email;
    initDB();
  } else {
    errEl.textContent = 'メールアドレスまたはパスワードが正しくありません';
  }
}

function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('loginScreen').classList.add('show');
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('results').innerHTML = '';
}

function checkSession() {
  const email = sessionStorage.getItem(SESSION_KEY);
  if (email) {
    document.getElementById('loginScreen').classList.remove('show');
    document.getElementById('logoutBtn').style.display = 'inline-block';
    document.getElementById('info-user').textContent = email;
    initDB();
  }
}

// ===== データ =====
async function initDB() {
  setSyncStatus('loading', '読み込み中…');
  try {
    const { data, error } = await db.from('monuments').select('*').order('year', { ascending: true, nullsFirst: true });
    if (error) throw error;
    if (data.length === 0) {
      setSyncStatus('loading', '初期データ投入中…');
      const records = BASE_DATA.map(r => ({
        year: r.year || null, nendo: r.nendo || null, jidai: r.jidai || null,
        category: r.category || null, name: r.name || null, basho: r.basho || null,
        mei: r.mei || null, honou: r.honou || null, biko: r.biko || null, photos: [],
      }));
      const { error: insertError } = await db.from('monuments').insert(records);
      if (insertError) throw insertError;
      const { data: newData } = await db.from('monuments').select('*').order('year', { ascending: true, nullsFirst: true });
      DB = newData || [];
    } else {
      DB = data;
    }
    setSyncStatus('ok', '同期済み ✓');
    render();
    updateInfo();
  } catch(e) {
    setSyncStatus('err', 'エラー: ' + e.message);
    console.error(e);
  }
}

function setSyncStatus(type, msg) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.className = 'sync-badge sync-' + type;
}

function updateInfo() {
  document.getElementById('info-total').textContent = DB.length + ' 件';
  document.getElementById('info-updated').textContent = new Date().toLocaleDateString('ja-JP');
}

function setCat(v) {
  currentCat = v;
  ['cat-all','cat-0','cat-1','cat-2','cat-3','cat-4'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  ['m-cat-all','m-cat-0','m-cat-1','m-cat-2','m-cat-3','m-cat-4'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  const cats = ['','記念碑・石碑','記念碑（伊勢参拝記念）','燈篭','狛犬','鳥居・社号標'];
  const idx = cats.indexOf(v);
  document.getElementById(idx === 0 ? 'cat-all' : 'cat-'+(idx-1))?.classList.add('active');
  document.getElementById(idx === 0 ? 'm-cat-all' : 'm-cat-'+(idx-1))?.classList.add('active');
  render();
}
function setJidai(v) {
  currentJidai = v;
  ['era-all','era-0','era-1','era-2','era-3','era-4'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  const eras = ['','江戸時代','明治','大正','昭和','平成以降'];
  const idx = eras.indexOf(v);
  document.getElementById(idx === 0 ? 'era-all' : 'era-'+(idx-1))?.classList.add('active');
  render();
}

function hl(text, q) {
  if (!q || !text) return text || '';
  const e = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(e, 'gi'), m => `<span class="hl">${m}</span>`);
}

function render() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const sort = document.getElementById('sortFilter').value;
  let list = DB.filter(r => {
    if (currentCat && r.category !== currentCat) return false;
    if (currentJidai && r.jidai !== currentJidai) return false;
    if (q) {
      const all = [r.name,r.mei,r.basho,r.honou,r.biko,r.nendo].join(' ').toLowerCase();
      if (!all.includes(q)) return false;
    }
    return true;
  });
  if (sort === 'year_asc') list.sort((a,b) => (a.year||9999)-(b.year||9999));
  else if (sort === 'year_desc') list.sort((a,b) => (b.year||0)-(a.year||0));
  else list.sort((a,b) => (a.name||'').localeCompare(b.name||'','ja'));

  const counts = {'':DB.length,'記念碑・石碑':0,'記念碑（伊勢参拝記念）':0,'燈篭':0,'狛犬':0,'鳥居・社号標':0};
  DB.forEach(r => { if (counts[r.category] !== undefined) counts[r.category]++; });
  document.getElementById('cnt-all').textContent = counts[''];
  document.getElementById('cnt-0').textContent = counts['記念碑・石碑'];
  document.getElementById('cnt-1').textContent = counts['記念碑（伊勢参拝記念）'];
  document.getElementById('cnt-2').textContent = counts['燈篭'];
  document.getElementById('cnt-3').textContent = counts['狛犬'];
  document.getElementById('cnt-4').textContent = counts['鳥居・社号標'];
  document.getElementById('countNum').textContent = list.length;
  document.getElementById('filterBadge').style.display = (q || currentCat || currentJidai) ? 'inline-block' : 'none';

  const rawQ = document.getElementById('searchInput').value.trim();
  const container = document.getElementById('results');
  if (list.length === 0) {
    container.innerHTML = `<div class="empty">見つかりませんでした。</div>`;
    return;
  }
  container.innerHTML = list.map((r, i) => {
    const catCls = 'tag-cat-' + r.category;
    const photos = r.photos || [];
    return `<div class="record" id="rec-${r.id}">
      <div class="record-head" onclick="toggleRec(${r.id})">
        <div class="record-num">${i+1}</div>
        <div class="record-body">
          <div class="record-title">${hl(r.name||'（名称不明）', rawQ)}</div>
          <div class="record-meta">
            ${r.year ? `<span class="tag tag-year">${r.year}年</span>` : ''}
            ${r.jidai ? `<span class="tag tag-year">${r.jidai}</span>` : ''}
            <span class="tag ${catCls}">${r.category}</span>
            ${r.basho ? `<span class="tag tag-place">${hl(r.basho.replace(/\n/g,' '), rawQ)}</span>` : ''}
            ${photos.length > 0 ? `<span class="tag tag-photo">写真 ${photos.length}枚</span>` : ''}
          </div>
        </div>
        <div class="record-actions" onclick="event.stopPropagation()">
          <button class="act" onclick="editRecord(${r.id})">編集</button>
          <button class="act print" onclick="exportOne(${r.id})">印刷用</button>
          <button class="act del" onclick="deleteRecord(${r.id})">削除</button>
        </div>
        <svg class="record-expand" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="record-detail">
        <div class="detail-cols">
          ${r.nendo ? `<div class="detail-field"><dt>成立時代</dt><dd>${hl(r.nendo, rawQ)}</dd></div>` : ''}
          ${r.jidai ? `<div class="detail-field"><dt>時代区分</dt><dd>${r.jidai}</dd></div>` : ''}
        </div>
        ${r.mei ? `<hr class="detail-sep"><div class="detail-full"><dt>銘文</dt><dd>${hl(r.mei, rawQ)}</dd></div>` : ''}
        ${r.honou ? `<hr class="detail-sep"><div class="detail-full"><dt>奉納者・関係者</dt><dd>${hl(r.honou, rawQ)}</dd></div>` : ''}
        ${r.biko ? `<hr class="detail-sep"><div class="detail-full"><dt>備考・石工・寸法</dt><dd>${hl(r.biko, rawQ)}</dd></div>` : ''}
        <hr class="detail-sep">
        <div class="photo-section"><dt>写真</dt>${buildPhotoGrid(r)}</div>
        <button class="record-close-btn" onclick="toggleRec(${r.id})">▲ 閉じる</button>
      </div>
    </div>`;
  }).join('');
}

function toggleRec(id) { document.getElementById('rec-'+id)?.classList.toggle('open'); }

// ===== 編集 =====
let editingId = null;
function openModal(id) {
  editingId = id || null;
  const r = id ? DB.find(x => x.id === id) : null;
  document.getElementById('modalTitle').textContent = r ? '編集' : '新規追加';
  document.getElementById('f_year').value = r?.year || '';
  document.getElementById('f_nendo').value = r?.nendo || '';
  document.getElementById('f_category').value = r?.category || '記念碑・石碑';
  document.getElementById('f_jidai').value = r?.jidai || '';
  document.getElementById('f_name').value = r?.name || '';
  document.getElementById('f_basho').value = r?.basho || '';
  document.getElementById('f_mei').value = r?.mei || '';
  document.getElementById('f_honou').value = r?.honou || '';
  document.getElementById('f_biko').value = r?.biko || '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('f_name').focus(), 50);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }
function closeModalIfBg(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

async function saveRecord() {
  const name = document.getElementById('f_name').value.trim();
  if (!name) { showToast('名称を入力してください'); return; }
  const existing = editingId ? DB.find(x => x.id === editingId) : null;
  const rec = {
    year: parseInt(document.getElementById('f_year').value) || null,
    nendo: document.getElementById('f_nendo').value.trim() || null,
    category: document.getElementById('f_category').value,
    jidai: document.getElementById('f_jidai').value || null,
    name, basho: document.getElementById('f_basho').value.trim() || null,
    mei: document.getElementById('f_mei').value.trim() || null,
    honou: document.getElementById('f_honou').value.trim() || null,
    biko: document.getElementById('f_biko').value.trim() || null,
    photos: existing?.photos || [],
    updated_at: new Date().toISOString(),
  };
  try {
    if (editingId) {
      const { error } = await db.from('monuments').update(rec).eq('id', editingId);
      if (error) throw error;
      const idx = DB.findIndex(x => x.id === editingId);
      if (idx >= 0) DB[idx] = { ...DB[idx], ...rec };
    } else {
      const { data, error } = await db.from('monuments').insert(rec).select();
      if (error) throw error;
      DB.push(data[0]);
    }
    closeModal(); render(); updateInfo();
    showToast(editingId ? '更新しました ✓' : '追加しました ✓');
    setSyncStatus('ok', '同期済み ✓');
  } catch(e) {
    showToast('保存に失敗しました');
    setSyncStatus('err', 'エラー');
    console.error(e);
  }
}

function editRecord(id) { openModal(id); }

async function deleteRecord(id) {
  const r = DB.find(x => x.id === id);
  if (!confirm(`「${r?.name}」を削除しますか？`)) return;
  try {
    const { error } = await db.from('monuments').delete().eq('id', id);
    if (error) throw error;
    DB = DB.filter(x => x.id !== id);
    render(); updateInfo();
    showToast('削除しました');
    setSyncStatus('ok', '同期済み ✓');
  } catch(e) {
    showToast('削除に失敗しました');
    console.error(e);
  }
}

// ===== 写真（Supabase Storage版） =====
const STORAGE_BUCKET = 'photos';

function buildPhotoGrid(r) {
  const photos = r.photos || [];
  return `<div class="photo-grid" id="photos-${r.id}">
    ${photos.map((url, i) => `
      <div class="photo-thumb">
        <img src="${url}" loading="lazy" onclick="openLightbox(${r.id},${i})">
        <button class="del-photo" onclick="deletePhoto(${r.id},${i})">✕</button>
      </div>`).join('')}
    <label class="photo-add">
      <span>＋</span>写真追加
      <input type="file" accept="image/*" multiple style="display:none" onchange="addPhotos(${r.id},this)">
    </label>
  </div>`;
}

async function addPhotos(id, input) {
  const r = DB.find(x => x.id === id);
  if (!r) return;
  if (!r.photos) r.photos = [];
  const files = Array.from(input.files);
  showToast('写真をアップロード中…');
  let uploaded = 0;
  for (const file of files) {
    const ext = file.name.split('.').pop();
    const path = `${id}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
    try {
      const { error } = await db.storage.from(STORAGE_BUCKET).upload(path, file);
      if (error) throw error;
      const { data } = db.storage.from(STORAGE_BUCKET).getPublicUrl(path);
      r.photos.push(data.publicUrl);
      uploaded++;
    } catch(e) {
      console.error('Upload error:', e);
      showToast('写真のアップロードに失敗しました');
    }
  }
  if (uploaded > 0) {
    try {
      await db.from('monuments').update({ photos: r.photos, updated_at: new Date().toISOString() }).eq('id', id);
      const g = document.getElementById('photos-'+id);
      if (g) g.outerHTML = buildPhotoGrid(r);
      showToast(`写真を${uploaded}枚追加しました ✓`);
      setSyncStatus('ok', '同期済み ✓');
    } catch(e) {
      showToast('写真URLの保存に失敗しました');
      console.error(e);
    }
  }
  input.value = '';
}

async function deletePhoto(id, idx) {
  const r = DB.find(x => x.id === id);
  if (!r || !confirm('この写真を削除しますか？')) return;
  const url = r.photos[idx];
  // StorageのパスをURLから抽出
  const path = url.split('/storage/v1/object/public/photos/')[1];
  if (path) {
    try {
      await db.storage.from(STORAGE_BUCKET).remove([path]);
    } catch(e) { console.error('Storage delete error:', e); }
  }
  r.photos.splice(idx, 1);
  try {
    await db.from('monuments').update({ photos: r.photos, updated_at: new Date().toISOString() }).eq('id', id);
    const g = document.getElementById('photos-'+id);
    if (g) g.outerHTML = buildPhotoGrid(r);
    showToast('写真を削除しました');
    setSyncStatus('ok', '同期済み ✓');
  } catch(e) {
    showToast('削除に失敗しました');
    console.error(e);
  }
}

let lbId=null, lbIdx=0;
function openLightbox(id,idx) {
  lbId=id; lbIdx=idx;
  const r = DB.find(x => x.id === id);
  document.getElementById('lightboxImg').src = r.photos[idx];
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeLightbox(); } });
